<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Tiếng Trung 24G — Ứng dụng học tập</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Noto+Serif+SC:wght@500;700;900&display=swap" rel="stylesheet"/>
<style>
:root{--cinnabar:#D9001B;--cinnabar7:#B00016;--gold:#FFD700;--gold-soft:#FCE7A6;--ink:#1A1413;--rice:#FBF7EF;--line:rgba(26,20,19,.1)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Be Vietnam Pro',system-ui,sans-serif;background:var(--rice);color:var(--ink);min-height:100vh;
  background-image:radial-gradient(circle at 1px 1px,rgba(26,20,19,.035) 1px,transparent 0);background-size:22px 22px}
.hanzi{font-family:'Noto Serif SC',serif}
.display{font-family:'Bricolage Grotesque',serif}

/* ===== LOGIN ===== */
#login-shell{display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:0 16px 50px -20px rgba(26,20,19,.35);
  padding:30px 26px 28px;max-width:380px;width:100%;text-align:center;position:relative;animation:rise .5s ease}
.login-logo{width:160px;margin:0 auto 6px;display:block}
.login-dragon{width:130px;margin:0 auto;display:block;filter:drop-shadow(0 8px 16px rgba(217,0,27,.18))}
.login-card h1{font-size:23px;margin-top:6px}
.login-sub{color:rgba(26,20,19,.55);font-size:14px;margin:6px 0 20px}
.login-card label{display:block;text-align:left;font-size:13px;font-weight:600;color:rgba(26,20,19,.7);margin:12px 0 5px}
.login-card input{width:100%;padding:13px 15px;border:2px solid var(--line);border-radius:12px;font-family:inherit;font-size:15px;transition:.2s}
.login-card input:focus{outline:none;border-color:var(--cinnabar)}
.login-btn{width:100%;margin-top:22px;padding:14px;background:var(--cinnabar);color:#fff;border:none;border-radius:13px;
  font-weight:700;font-size:16px;font-family:inherit;cursor:pointer;box-shadow:0 8px 24px -8px rgba(217,0,27,.5);transition:.2s}
.login-btn:active{transform:scale(.97)}

/* ===== HEADER ===== */
#app-shell{display:none}
header{position:sticky;top:0;z-index:50;background:rgba(251,247,239,.93);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.nav{max-width:900px;margin:0 auto;padding:9px 14px;display:flex;align-items:center;gap:10px}
.nav-logo{height:34px;width:auto}
.streak{font-size:11px;background:var(--gold-soft);padding:5px 10px;border-radius:99px;font-weight:600;white-space:nowrap}
.acct{display:flex;align-items:center;gap:8px;margin-left:auto}
.acct-av{width:36px;height:36px;border-radius:99px;background:linear-gradient(135deg,#D9001B,#B00016);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.acct-info{line-height:1.15;text-align:right;max-width:120px;overflow:hidden}
.acct-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct-cls{font-size:11px;color:rgba(26,20,19,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.acct-out{background:none;border:none;color:rgba(26,20,19,.4);font-size:18px;cursor:pointer;padding:4px 6px;flex-shrink:0}
.acct-out:hover{color:var(--cinnabar)}
.tabs{max-width:900px;margin:0 auto;display:flex;gap:4px;padding:7px 10px;overflow-x:auto}
.tab{flex:1;min-width:76px;padding:9px 6px;border:none;background:transparent;border-radius:11px;font-family:inherit;font-size:12.5px;font-weight:600;color:rgba(26,20,19,.5);cursor:pointer;transition:.2s;white-space:nowrap}
.tab.active{background:var(--cinnabar);color:#fff;box-shadow:0 4px 16px -6px rgba(217,0,27,.4)}

/* ===== MAIN ===== */
main{max-width:900px;margin:0 auto;padding:16px 16px 48px}
.screen{display:none;animation:rise .35s ease}
.screen.active{display:block}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
h1.title{font-family:'Bricolage Grotesque';font-weight:800;font-size:25px;margin-bottom:4px}
.sub{color:rgba(26,20,19,.55);font-size:14px;margin-bottom:16px}
.sec-title{font-family:'Bricolage Grotesque';font-size:18px;margin:18px 0 12px}

/* Hero */
.hero{display:flex;align-items:center;gap:14px;background:linear-gradient(120deg,#fff,#FFF6F0);border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 8px 30px -16px rgba(26,20,19,.2);overflow:hidden}
.hero-dragon{width:92px;height:auto;flex-shrink:0;filter:drop-shadow(0 6px 12px rgba(217,0,27,.18))}
.hero-text h1{font-size:22px;line-height:1.15}
.hero-text p{color:rgba(26,20,19,.6);font-size:14px;margin-top:3px}
.hero-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.hero-stats span{font-size:12px;background:var(--gold-soft);padding:4px 10px;border-radius:99px;font-weight:600}

/* Lesson grid */
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:11px}
.lcard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;cursor:pointer;transition:.2s;text-align:left}
.lcard:hover,.lcard:active{border-color:var(--cinnabar);transform:translateY(-2px);box-shadow:0 8px 28px -12px rgba(26,20,19,.3)}
.lcard .num{display:inline-flex;width:30px;height:30px;align-items:center;justify-content:center;background:var(--cinnabar);color:#fff;border-radius:8px;font-weight:700;font-size:14px;margin-bottom:8px;font-family:'Bricolage Grotesque'}
.lcard .lz{font-family:'Noto Serif SC';font-weight:700;font-size:17px;line-height:1.2}
.lcard .lp{font-size:11px;color:rgba(26,20,19,.5);margin-top:2px}
.lcard .lc{font-size:11px;color:var(--cinnabar);margin-top:7px;font-weight:600}

.src-pick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}

/* Flashcard */
.fc-top{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:14px;color:rgba(26,20,19,.6)}
.chip{background:var(--gold-soft);padding:4px 11px;border-radius:99px;font-size:12px;font-weight:600}
.flip{perspective:1500px;height:290px;cursor:pointer;margin-bottom:8px}
.fi{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,.2,.2,1)}
.fi.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 10px 40px -14px rgba(26,20,19,.28)}
.front{background:#fff;border:1px solid var(--line)}
.back-f{background:linear-gradient(135deg,#fff,#FFF1F2);border:1px solid rgba(217,0,27,.3);transform:rotateY(180deg);text-align:center;padding:28px}
.fh{font-family:'Noto Serif SC';font-size:72px;font-weight:700;line-height:1}
.fp{margin-top:14px;font-size:20px;color:var(--cinnabar)}
.fm{font-size:24px;font-weight:700}
.fe{font-family:'Noto Serif SC';margin-top:14px;font-size:18px;color:rgba(26,20,19,.6)}
.spk{background:rgba(217,0,27,.1);border:none;color:var(--cinnabar);width:46px;height:46px;border-radius:99px;cursor:pointer;font-size:20px;display:inline-flex;align-items:center;justify-content:center}
.spk.sm{width:32px;height:32px;font-size:14px;vertical-align:middle}
.front .spk{margin-top:18px}
.tap-hint{position:absolute;bottom:14px;font-size:11px;color:rgba(26,20,19,.35)}
.grades{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:14px}
.g{padding:13px 4px;border:none;border-radius:12px;color:#fff;font-weight:600;cursor:pointer;font-family:inherit;font-size:14px;transition:.15s}
.g:active{transform:scale(.96)}
.g0{background:rgba(26,20,19,.8)}.g1{background:var(--cinnabar)}.g2{background:#f59e0b}.g3{background:#059669}
.reveal{width:100%;padding:14px;border:2px solid var(--cinnabar);background:transparent;color:var(--cinnabar);border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;margin-top:14px}
.reveal:active{background:var(--cinnabar);color:#fff}

/* Quiz */
.q-progress{height:7px;background:rgba(26,20,19,.1);border-radius:99px;margin-bottom:10px;overflow:hidden}
.q-progress i{display:block;height:100%;background:linear-gradient(90deg,var(--cinnabar),var(--gold));transition:width .3s;border-radius:99px}
.q-typebadge{font-size:12px;font-weight:700;color:var(--cinnabar);background:#FFF1F2;display:inline-block;padding:4px 12px;border-radius:99px;margin-bottom:14px}
/* quiz mode menu */
.quiz-modes{display:flex;flex-direction:column;gap:11px;margin-bottom:16px}
.qmode{background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px 16px;box-shadow:0 6px 24px -16px rgba(26,20,19,.2)}
.qmode-title{font-family:'Bricolage Grotesque';font-weight:700;font-size:17px}
.qmode-desc{font-size:13px;color:rgba(26,20,19,.55);margin-top:2px}
.qmode-actions{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
.qm-btn{flex:1;min-width:120px;padding:11px;border:2px solid var(--line);background:#fff;border-radius:11px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;transition:.15s;color:var(--ink)}
.qm-btn:hover{border-color:var(--cinnabar)}
.qm-lesson{background:var(--cinnabar);color:#fff;border-color:var(--cinnabar)}
.q-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 8px 30px -16px rgba(26,20,19,.2)}
.q-prompt{text-align:center;margin-bottom:18px}
.q-prompt .qh{font-family:'Noto Serif SC';font-size:54px;font-weight:700;line-height:1.1}
.q-prompt .qp{color:var(--cinnabar);font-size:16px;margin-top:6px}
.q-prompt .qq{font-size:16px;font-weight:600;margin-top:10px}
.opts{display:grid;gap:10px}
.opt{padding:15px;border:2px solid var(--line);border-radius:13px;background:#fff;font-family:inherit;font-size:15px;cursor:pointer;text-align:left;transition:.15s;font-weight:500}
.opt:hover{border-color:var(--cinnabar)}
.opt.correct{border-color:#059669;background:#ecfdf5;color:#047857;font-weight:700}
.opt.wrong{border-color:var(--cinnabar);background:#FFF1F2;color:var(--cinnabar)}
.opt:disabled{cursor:default}
.q-next{width:100%;margin-top:16px;padding:14px;background:var(--cinnabar);color:#fff;border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;display:none}
.q-next.show{display:block}
.q-check{width:100%;margin-top:14px;padding:13px;background:var(--ink);color:#fff;border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
/* fill / translate */
.fill-clue{display:flex;flex-direction:column;gap:4px;align-items:center;margin:6px 0 10px}
.fill-py{color:var(--cinnabar);font-size:22px;font-weight:600}
.fill-m{font-size:17px;font-weight:600}
.fill-input{width:100%;padding:15px;border:2px solid var(--line);border-radius:13px;font-size:30px;text-align:center;transition:.2s}
.fill-input:focus{outline:none;border-color:var(--cinnabar)}
.trans-vi{font-size:24px;font-weight:700;margin:8px 0}
.q-result{margin-top:12px;text-align:center}
.res-ok{color:#047857;font-weight:700;font-size:16px;background:#ecfdf5;padding:11px;border-radius:11px}
.res-no{color:var(--cinnabar);font-weight:600;font-size:15px;background:#FFF1F2;padding:11px;border-radius:11px}
.res-ok .hanzi,.res-no .hanzi{font-size:22px}
/* match */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.match-col{display:flex;flex-direction:column;gap:9px}
.match-item{padding:14px 8px;border:2px solid var(--line);border-radius:12px;background:#fff;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:.15s}
.match-item.hanzi{font-family:'Noto Serif SC';font-size:24px}
.match-item.sel{border-color:var(--cinnabar);background:#FFF1F2}
.match-item.done{opacity:.35;border-color:#059669;background:#ecfdf5}
/* arrange */
.arrange-answer{min-height:58px;border:2px dashed rgba(217,0,27,.3);border-radius:13px;padding:10px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:12px}
.arr-placeholder{color:rgba(26,20,19,.35);font-size:13px}
.arrange-pool{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.tok{padding:11px 15px;border:2px solid var(--line);border-radius:11px;background:#fff;font-size:22px;cursor:pointer;transition:.15s;font-weight:600}
.tok:hover{border-color:var(--cinnabar)}
.tok.used{opacity:.25;cursor:default}
.tok-ans{border-color:var(--cinnabar);background:#FFF1F2}
/* GAME ghép bộ thủ */
.game-hud{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:14px;font-weight:600}
.game-hud .gscore{color:var(--cinnabar)}
.game-hud .gcombo{background:var(--gold);padding:3px 11px;border-radius:99px;font-size:12px}
.game-target{background:#fff;border:1px solid var(--line);border-radius:20px;padding:22px;text-align:center;box-shadow:0 8px 30px -16px rgba(26,20,19,.2);margin-bottom:16px}
.game-target .gt-label{font-size:13px;color:rgba(26,20,19,.5)}
.game-target .gt-meaning{font-size:22px;font-weight:700;margin:6px 0}
.game-target .gt-slots{display:flex;gap:10px;justify-content:center;margin-top:14px;min-height:74px;align-items:center}
.gslot{width:64px;height:64px;border:2px dashed rgba(217,0,27,.3);border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif SC';font-size:34px;background:var(--rice);color:rgba(26,20,19,.25)}
.gslot.filled{border-style:solid;border-color:#059669;background:#ecfdf5;color:var(--ink)}
.game-target .gt-preview{font-family:'Noto Serif SC';font-size:44px;margin-top:10px;min-height:52px;color:var(--cinnabar);font-weight:700}
.game-pool{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.gtile{min-width:64px;height:64px;padding:0 10px;border:2px solid var(--line);border-radius:14px;background:#fff;font-family:'Noto Serif SC';font-size:32px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
.gtile:hover{border-color:var(--cinnabar);transform:translateY(-2px)}
.gtile .gtile-name{font-family:'Be Vietnam Pro';font-size:10px;color:rgba(26,20,19,.45);margin-top:2px;font-weight:500}
.gtile.used{opacity:.25;pointer-events:none}
.gtile.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.game-feedback{text-align:center;font-weight:700;font-size:16px;margin:12px 0;min-height:24px}
.game-feedback.ok{color:#047857}.game-feedback.no{color:var(--cinnabar)}
.game-actions{display:flex;gap:9px;margin-top:6px}
.game-actions button{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;font-family:inherit;font-size:14px;cursor:pointer}
.g-skip{background:transparent;border:2px solid var(--line)!important;color:rgba(26,20,19,.6)}
.g-hint{background:var(--gold-soft);color:var(--ink)}

/* Write */
.w-prompt{text-align:center;margin-bottom:12px}
.w-prompt .wh{font-family:'Noto Serif SC';font-size:54px;font-weight:700;color:var(--cinnabar)}
.w-prompt .wp{color:rgba(26,20,19,.55);margin-top:4px;font-size:14px}
.w-strokecount{margin-top:8px;font-size:14px;background:var(--gold-soft);display:inline-block;padding:5px 14px;border-radius:99px}
.w-ruleBtn{margin:12px auto 0;display:block;background:transparent;border:2px solid var(--line);border-radius:11px;padding:9px 16px;font-family:inherit;font-weight:600;font-size:14px;color:var(--ink);cursor:pointer}
.w-ruleBtn:hover{border-color:var(--cinnabar)}
.w-rules{margin-top:10px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px}
.wr-title{font-weight:700;font-size:14px;margin-bottom:10px;color:var(--cinnabar)}
.wr-item{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-top:1px solid var(--line)}
.wr-item:first-of-type{border-top:none}
.wr-num{font-size:20px;flex-shrink:0}
.wr-desc{font-size:13px;color:rgba(26,20,19,.6)}
.wr-desc .hanzi,.wr-item b{font-size:14px}
.canvas-wrap{position:relative;width:280px;height:280px;margin:0 auto}
canvas{border:2px dashed rgba(217,0,27,.3);border-radius:16px;background:#fff;touch-action:none;display:block;width:280px;height:280px}
.gl{position:absolute;background:rgba(217,0,27,.13);pointer-events:none}
.glv{left:50%;top:8px;bottom:8px;width:1px;transform:translateX(-.5px)}
.glh{top:50%;left:8px;right:8px;height:1px;transform:translateY(-.5px)}
.w-ghost{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif SC';font-size:200px;color:rgba(26,20,19,.07);pointer-events:none;font-weight:700}
.w-row{display:flex;gap:9px;margin-top:14px;max-width:280px;margin-left:auto;margin-right:auto}
.w-row button{flex:1;padding:12px 6px;border-radius:12px;font-weight:600;font-family:inherit;font-size:13.5px;cursor:pointer;border:none}
.w-clear{background:transparent;border:2px solid var(--line)!important;color:rgba(26,20,19,.6)}
.w-show{background:var(--ink);color:#fff}
.w-rate{background:var(--cinnabar);color:#fff}
.w-next{background:#059669;color:#fff}

/* Vocab */
.v-search{width:100%;padding:13px 16px;border:1px solid var(--line);border-radius:13px;font-family:inherit;font-size:15px;margin-bottom:14px;background:#fff}
.v-search:focus{outline:none;border-color:var(--cinnabar)}
.v-item{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px 16px;margin-bottom:8px}
.v-item .vh{font-family:'Noto Serif SC';font-size:28px;font-weight:700;min-width:50px}
.v-item .vmeta{flex:1;min-width:0}
.v-item .vp{color:var(--cinnabar);font-size:13px}
.v-item .vm{font-weight:500;font-size:15px}
.v-item .vspk{background:rgba(217,0,27,.08);border:none;color:var(--cinnabar);width:38px;height:38px;border-radius:99px;cursor:pointer;flex-shrink:0;font-size:16px}

/* Scorecard / done */
.center-box,.scorecard{text-align:center;padding:36px 20px;background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 30px -16px rgba(26,20,19,.2);margin-top:8px}
.center-box .big{font-size:54px}
.center-box h2{font-family:'Bricolage Grotesque';font-size:24px;margin-top:10px}
.center-box p{color:rgba(26,20,19,.55);margin-top:8px}
.center-box button{margin-top:20px;padding:13px 24px;background:var(--cinnabar);color:#fff;border:none;border-radius:12px;font-weight:700;font-family:inherit;cursor:pointer;font-size:15px}
.score-dragon{width:110px;margin:0 auto 4px;display:block;filter:drop-shadow(0 8px 14px rgba(217,0,27,.2))}
.score-big{font-family:'Bricolage Grotesque';font-size:54px;font-weight:800;color:var(--cinnabar);line-height:1}
.score-detail{font-size:16px;font-weight:600;margin-top:4px}
.score-name{font-size:13px;color:rgba(26,20,19,.55);margin-top:6px;background:var(--rice);display:inline-block;padding:5px 14px;border-radius:99px}
.score-msg{font-size:18px;margin-top:14px;font-weight:600}
.footer{text-align:center;font-size:11px;color:rgba(26,20,19,.4);padding:18px}

/* ===== Nút bánh răng cài đặt ===== */
.acct-gear{background:none;border:none;color:rgba(26,20,19,.4);font-size:18px;cursor:pointer;padding:4px 6px;flex-shrink:0}
.acct-gear:hover{color:var(--cinnabar)}

/* ===== Khối chung ===== */
.panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 8px 30px -18px rgba(26,20,19,.2);margin-bottom:14px}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:8px 14px;border:2px solid var(--line);background:#fff;border-radius:99px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;transition:.15s;color:var(--ink)}
.pill:hover{border-color:var(--cinnabar)}
.pill.on{background:var(--cinnabar);color:#fff;border-color:var(--cinnabar)}
.note-line{font-size:12.5px;color:rgba(26,20,19,.55);margin:6px 0 0;line-height:1.5}

function phItemHTML(i, it){
  return '<div class="sp-item" id="spit' + i + '">' +
    '<div style="font-size:30px;font-weight:800;color:var(--cinnabar);letter-spacing:1px;font-family:inherit">' + esc(it.py) + '</div>' +
    (it.vi ? '<div class="sp-vi">' + esc(it.vi) + '</div>' : '') +
    '<div class="sp-actions">' +
      '<button class="sp-btn" onclick="speak(' + sq(it.zh) + ')">🔊 Nghe mẫu</button>' +
      '<button class="sp-btn" onclick="speak(' + sq(it.zh) + ',true)">🐢 Chậm</button>' +
      '<button class="sp-btn rec" id="recbtn' + i + '" onclick="spToggleRec(' + i + ')">⏺ Ghi âm</button>' +
    '</div><div class="sp-result" id="spres' + i + '" style="display:none"></div></div>';
}
function renderPhonics(L){
  const ph = PHONICS[L.n];
  if (!ph){ return '<p class="tc-empty">Phần luyện ngữ âm chỉ có ở Bài 1–5.</p>'; }
  spItems = ph.items.map(function(x){ return { zh:x.zh, py:x.py, vi:x.vi }; });
  const items = spItems.map(function(it,i){ return phItemHTML(i,it); }).join('');
  return '<div class="panel"><div class="note-line" style="font-size:13.5px;line-height:1.6">' + esc(ph.note) + '</div>' +
    '<div class="note-line" style="margin-top:6px">Nhìn pinyin đọc to từng âm tiết — bấm 🔊 nghe mẫu, ⏺ để được chấm. Hãy đọc đủ ít nhất ' + spItems.length + ' mục rồi bấm Tổng kết.</div></div>' +
    '<h2 class="sec-title">Luyện ' + spItems.length + ' âm tiết</h2>' + items + spSummaryBar();
}

<script>
/* ============ Tiếng Trung 24G — App học tập (offline) v2 ============ */
'use strict';

// ---------- Lưu trữ ----------
const STORE = 'tt24g_progress';
const USER_KEY = 'tt24g_user';
function load(k, def) { try { return JSON.parse(localStorage.getItem(k)) || def; } catch { return def; } }
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

let progress = load(STORE, {});
if (!progress.reviewed) progress.reviewed = 0;
if (!progress.srs) progress.srs = {};
if (!progress.scores) progress.scores = [];
if (!progress.aiLog) progress.aiLog = [];
let user = load(USER_KEY, null);

function saveProg() { save(STORE, progress); }

// ---------- Phát âm (tương thích iPhone/iOS Safari) ----------
let _voices = [];
let _zhVoice = null;
let _speechReady = false;
let _warnedNoVoice = false;
let _speechWaited = false;

function _loadVoices() {
  if (!window.speechSynthesis) return;
  _voices = window.speechSynthesis.getVoices() || [];
  const zhAll = _voices.filter(v => /zh[-_]CN/i.test(v.lang) || /^zh/i.test(v.lang) || /chinese|中文|普通话|mandarin/i.test(v.name));
  const FEMALE = /tingting|ting-ting|mei-?jia|sin-?ji|li-?mu|xiaoxiao|xiaoyi|huihui|yaoyao|female|woman|女/i;
  _zhVoice =
    zhAll.find(v => FEMALE.test(v.name) && /premium|enhanced|高质量/i.test(v.name)) ||
    zhAll.find(v => FEMALE.test(v.name)) ||
    zhAll.find(v => /premium|enhanced|高质量/i.test(v.name)) ||
    zhAll.find(v => /zh[-_]CN/i.test(v.lang)) ||
    zhAll[0] || null;
}
if (window.speechSynthesis) {
  _loadVoices();
  window.speechSynthesis.onvoiceschanged = _loadVoices;
}

// "Mở khóa" speechSynthesis — iOS VÀ Android đều cần kích hoạt trong thao tác chạm.
// KHÔNG dùng {once} để Android luôn được resume lại (Android hay tự pause hàng đợi).
function _unlockSpeech() {
  if (!window.speechSynthesis) return;
  try {
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();
    if (!_speechReady) {
      const warm = new SpeechSynthesisUtterance(' ');
      warm.volume = 0; warm.lang = 'zh-CN';
      window.speechSynthesis.speak(warm);
      _speechReady = true;
    }
    _loadVoices();
  } catch (e) {}
}
document.addEventListener('touchstart', _unlockSpeech, { passive: true });
document.addEventListener('touchend', _unlockSpeech, { passive: true });
document.addEventListener('click', _unlockSpeech);

function _doSpeak(text, slow) {
  const ss = window.speechSynthesis;
  ss.cancel();
  if (ss.paused) ss.resume();
  const chars = [...text];
  const readSlow = slow === true;
  const speakOne = (t, rate, delay) => setTimeout(() => {
    try {
      if (ss.paused) ss.resume();
      const u = new SpeechSynthesisUtterance(t);
      u.lang = 'zh-CN'; u.rate = rate; u.pitch = 1;
      if (_zhVoice) u.voice = _zhVoice;
      ss.speak(u);
    } catch (e) {}
  }, delay);
  if (readSlow && chars.length > 1) {
    speakOne(text, 0.6, 60);
    let d = 60 + 700 * chars.length;
    chars.forEach((c) => { speakOne(c, 0.55, d); d += 750; });
  } else {
    speakOne(text, readSlow ? 0.55 : 0.92, 60);
  }
}


// ---------- TTS: GIỌNG ĐỌC TỰ NHIÊN (Gemini neural) ----------
const TTS_MODE_STORE = 'tt24g_ttsmode';
const TTS_VOICE_STORE = 'tt24g_ttsvoice';
const TTS_MODEL = 'gemini-2.5-flash-preview-tts';
const TTS_VOICES = [['Kore','Kore — nữ, rõ ràng, chuẩn (khuyên dùng)'],['Leda','Leda — nữ, trẻ trung'],['Aoede','Aoede — nữ, nhẹ nhàng'],['Zephyr','Zephyr — nữ, tươi sáng'],['Puck','Puck — nam, sinh động'],['Charon','Charon — nam, trầm ấm']];
function getTtsMode(){ try{ return localStorage.getItem(TTS_MODE_STORE) || 'browser'; }catch{ return 'browser'; } }
function setTtsMode(m){ try{ localStorage.setItem(TTS_MODE_STORE, m); }catch{} }
function getTtsVoice(){ try{ return localStorage.getItem(TTS_VOICE_STORE) || 'Kore'; }catch{ return 'Kore'; } }
function setTtsVoice(v){ try{ localStorage.setItem(TTS_VOICE_STORE, v); }catch{} }

let _ttsCache = {}, _ttsAudio = null;
function _stopTtsAudio(){ if (_ttsAudio) { try { _ttsAudio.pause(); } catch (e) {} _ttsAudio = null; } }
function pcmToWavUrl(b64, rate){
  const bin = atob(b64), len = bin.length;
  const buf = new ArrayBuffer(44 + len), dv = new DataView(buf);
  const ws = (o, s) => { for (let i = 0; i < s.length; i++) dv.setUint8(o + i, s.charCodeAt(i)); };
  ws(0, 'RIFF'); dv.setUint32(4, 36 + len, true); ws(8, 'WAVE'); ws(12, 'fmt ');
  dv.setUint32(16, 16, true); dv.setUint16(20, 1, true); dv.setUint16(22, 1, true);
  dv.setUint32(24, rate, true); dv.setUint32(28, rate * 2, true); dv.setUint16(32, 2, true); dv.setUint16(34, 16, true);
  ws(36, 'data'); dv.setUint32(40, len, true);
  for (let i = 0; i < len; i++) dv.setUint8(44 + i, bin.charCodeAt(i));
  return URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
}
async function geminiTTS(text, slow){
  const voice = getTtsVoice();
  const ck = voice + '|' + (slow ? 's' : 'n') + '|' + text;
  if (_ttsCache[ck]) return _ttsCache[ck];
  const pre = slow ? '请用很慢的速度，一个字一个字地清楚朗读下面的内容：' : '请用标准、清晰、自然的普通话朗读下面的内容：';
  const body = { contents: [{ parts: [{ text: pre + text }] }],
    generationConfig: { responseModalities: ['AUDIO'], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } } } };
  const data = await geminiRaw(TTS_MODEL, body);
  const part = ((((data.candidates || [])[0] || {}).content || {}).parts || []).find(p => p.inlineData || p.inline_data);
  const inl = part && (part.inlineData || part.inline_data);
  if (!inl || !inl.data) throw new Error('NO_AUDIO');
  const mime = inl.mimeType || inl.mime_type || '';
  const rm = /rate=(\d+)/.exec(mime); const rate = rm ? +rm[1] : 24000;
  const u = pcmToWavUrl(inl.data, rate);
  _ttsCache[ck] = u; return u;
}
async function speakAI(text, slow){
  _stopTtsAudio();
  const u = await geminiTTS(text, slow);
  const a = new Audio(u); _ttsAudio = a; await a.play();
}
// Dispatcher: ưu tiên giọng AI tự nhiên, lỗi thì dùng giọng trình duyệt
function numToRead(s){
  return (s || '').replace(/[0-9]{5,}/g, function(run){
    const m = {'0':'零','1':'幺','2':'二','3':'三','4':'四','5':'五','6':'六','7':'七','8':'八','9':'九'};
    return run.split('').map(function(d){ return m[d] || d; }).join('、');
  });
}
async function speak(text, slow){
  text = numToRead((text || '').toString());
  const POLY = { '还':'还有', '了':'好了', '少':'多少', '看':'看见', '行':'不行', '长':'很长', '只':'一只', '得':'觉得', '回':'回家' };
  if (POLY[text]) text = POLY[text];
  if (getTtsMode() === 'ai' && aiReady()) {
    try { await speakAI(text, slow); return; } catch (e) {}
  }
  speakBrowser(text, slow);
}
function pickTtsMode(m){ setTtsMode(m); renderSettings(); }
async function ttsTest(){
  const m = document.getElementById('tts-msg');
  if (m) m.innerHTML = '<span class="spin"></span> Đang tải giọng...';
  try {
    if (getTtsMode() === 'ai' && aiReady()) { await speakAI('你好！欢迎学习汉语，我们一起加油。'); }
    else { speakBrowser('你好！欢迎学习汉语。'); }
    if (m) m.textContent = '✅ Đã phát thử. Nếu không nghe thấy, kiểm tra loa/âm lượng.';
  } catch (e) { if (m) m.textContent = '❌ ' + aiErrMsg(e) + ' — tạm dùng giọng trình duyệt.'; speakBrowser('你好'); }
}


function speakBrowser(text, slow) {
  if (!window.speechSynthesis) {
    alert('Thiết bị này không hỗ trợ phát âm tự động.');
    return;
  }
  const POLY = { '还':'还有', '了':'好了', '少':'多少', '看':'看见', '行':'不行', '长':'很长', '只':'一只', '得':'觉得', '回':'回家' };
  if (POLY[text]) text = POLY[text];
  _unlockSpeech();
  // Android: getVoices() có thể rỗng lúc đầu -> đợi voices nạp xong rồi mới phát
  if ((!_voices || _voices.length === 0) && !_speechWaited) {
    _speechWaited = true;
    let tries = 0;
    const waiter = setInterval(() => {
      _loadVoices(); tries++;
      if ((_voices && _voices.length > 0) || tries > 10) {
        clearInterval(waiter);
        _doSpeak(text, slow);
      }
    }, 150);
    return;
  }
  _doSpeak(text, slow);
}

// ---------- Âm thanh phản hồi (đúng/sai) ----------
let _audioCtx = null;
function _actx() {
  if (!_audioCtx && (window.AudioContext || window.webkitAudioContext)) {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return _audioCtx;
}
function feedbackSound(ok) {
  const ctx = _actx();
  if (!ctx) return;
  try {
    if (ctx.state === 'suspended') ctx.resume();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    const t = ctx.currentTime;
    if (ok) {
      // tiếng "tinh" vui (hai nốt đi lên)
      o.type = 'sine';
      o.frequency.setValueAtTime(880, t);
      o.frequency.setValueAtTime(1320, t + 0.12);
      g.gain.setValueAtTime(0.25, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      o.start(t); o.stop(t + 0.35);
    } else {
      // tiếng trầm nhẹ báo sai
      o.type = 'triangle';
      o.frequency.setValueAtTime(220, t);
      o.frequency.exponentialRampToValueAtTime(140, t + 0.3);
      g.gain.setValueAtTime(0.22, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
      o.start(t); o.stop(t + 0.32);
    }
  } catch (e) {}
}
// Lời khen / động viên (tích cực, không lăng mạ học sinh)
const PRAISE = ['Bạn giỏi quá! 🎉', 'Tuyệt vời! 👏', 'Chính xác! ⭐', 'Quá đỉnh! 🌟', 'Xuất sắc! 🥳'];
const ENCOURAGE = ['Chưa đúng rồi, xem đáp án nhé!', 'Sai một chút thôi, cố lên! 💪', 'Gần đúng rồi, thử lại lần sau nhé!', 'Không sao, học từ lỗi sai mà! 📚'];
function praiseMsg() { return PRAISE[Math.random() * PRAISE.length | 0]; }
function encourageMsg() { return ENCOURAGE[Math.random() * ENCOURAGE.length | 0]; }

// ---------- Helpers ----------
function esc(s) { return (s || '').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
function shuffle(a) { const x = a.slice(); for (let i = x.length-1; i>0; i--){ const j = Math.random()*(i+1)|0; [x[i],x[j]]=[x[j],x[i]]; } return x; }
function allVocab() { return DATA.lessons.flatMap(l => l.vocab.map(v => ({...v, lesson:l.n}))); }
function lessonById(n) { return DATA.lessons.find(l => l.n === n); }
function initials(name) { const p = (name||'').trim().split(/\s+/); return ((p[0]||'')[0]||'') + ((p[p.length-1]||'')[0]||''); }

}

// ============ FLASHCARD ============
let fcQueue = [], fcFlipped = false, fcDone = 0;
function renderFlashStart() {
  document.getElementById('flash').innerHTML =
    '<h1 class="title">🎴 Flashcard</h1>' +
    '<p class="sub">Lật thẻ, tự chấm độ nhớ. Thẻ khó sẽ xuất hiện lại nhiều hơn.</p>' +
    sourcePicker('startFlash', allVocab().length) + '<div id="fc-body"></div>';
}
function startFlash(lessonN) {
  let pool = lessonN ? lessonById(lessonN).vocab.map(v => ({...v, lesson:lessonN})) : allVocab();
  pool = pool.map(v => ({...v, box: (progress.srs[v.h]||{}).box || 0})).sort((a,b) => a.box - b.box);
  fcQueue = shuffle(pool.slice(0, 30)); fcFlipped = false; fcDone = 0;
  renderFlashCard();
}
function renderFlashCard() {
  const body = document.getElementById('fc-body'); if (!body) return;
  if (fcQueue.length === 0) { body.innerHTML = doneBox('Hoàn thành!', 'Bạn đã ôn ' + fcDone + ' thẻ.', 'startFlash(null)', 'Ôn tiếp'); return; }
  const c = fcQueue[0]; const box = (progress.srs[c.h]||{}).box || 1;
  body.innerHTML =
    '<div class="fc-top"><span>Còn lại: <b style="color:var(--cinnabar)">' + fcQueue.length + '</b></span>' +
    '<span class="chip">Hộp ' + box + '/5</span><span>Đã ôn: ' + fcDone + '</span></div>' +
    '<div class="flip" onclick="flipCard(event)"><div class="fi' + (fcFlipped?' flipped':'') + '">' +
      '<div class="face front"><div class="fh hanzi">' + esc(c.h) + '</div><div class="fp">' + esc(c.p) + '</div>' +
        '<button class="spk" onclick="event.stopPropagation();speak(\'' + esc(c.h) + '\')">🔊</button>' +
        '<div class="tap-hint">Chạm để lật</div></div>' +
      '<div class="face back-f"><div class="fm">' + esc(c.m) + '</div>' +
        (c.e ? '<div class="fe hanzi">' + esc(c.e) + '</div>' : '') + '</div>' +
    '</div></div>' +
    (fcFlipped ?
      '<div class="grades"><button class="g g0" onclick="gradeCard(0)">Quên</button>' +
      '<button class="g g1" onclick="gradeCard(1)">Khó</button>' +
      '<button class="g g2" onclick="gradeCard(2)">Ổn</button>' +
      '<button class="g g3" onclick="gradeCard(3)">Dễ</button></div>'
      : '<button class="reveal" onclick="flipCard()">Hiện đáp án</button>');
}
function flipCard(e) { if (e && e.target && e.target.classList.contains('spk')) return; fcFlipped = !fcFlipped; renderFlashCard(); }
function gradeCard(g) {
  const c = fcQueue[0];
  let st = progress.srs[c.h] || { box: 1 };
  st.box = g >= 2 ? Math.min(5, st.box + 1) : 1;
  progress.srs[c.h] = st; progress.reviewed++; saveProg(); updateStreak();
  fcQueue.shift(); fcFlipped = false; fcDone++; renderFlashCard();
}

let quizList = [], quizIdx = 0, quizScore = 0, quizSource = null;
const QUIZ_TYPES = ['choose', 'fill', 'match', 'translate'];
function renderQuizStart() {
  const ls = currentLesson;
  document.getElementById('quiz').innerHTML =
    '<h1 class="title">✍️ Kiểm tra</h1>' +
    '<p class="sub">Bài kiểm tra tổng hợp: từ vựng, sắp xếp câu và dịch câu — tự động trộn đề. Bấm để bắt đầu, có chấm điểm cuối bài.</p>' +
    '<div class="quiz-modes">' +
      '<div class="qmode"><div class="qmode-head"><div class="qmode-title">📝 Bắt đầu kiểm tra</div>' +
      '<div class="qmode-desc">Gồm chọn nghĩa, điền từ, nối từ, dịch từ, sắp xếp câu và dịch câu — trộn ngẫu nhiên.</div></div>' +
      '<div class="qmode-actions">' +
      (ls ? '<button class="qm-btn qm-lesson" onclick="startTest(' + ls + ')">Kiểm tra Bài ' + ls + '</button>' : '') +
      '<button class="qm-btn" onclick="startTest(null)">Kiểm tra tất cả các bài</button>' +
      '</div></div>' +
    '</div>' +
    '<div id="quiz-body"></div>';
}
function sentencesFor(lessonN) {
  if (lessonN) return (lessonById(lessonN).sentences || []).map(s => ({...s, lesson:lessonN}));
  return DATA.lessons.flatMap(l => (l.sentences || []).map(s => ({...s, lesson:l.n})));
}
// Bài kiểm tra GỘP: từ vựng (4 dạng) + sắp xếp câu + dịch câu, tự động trộn.
function startTest(lessonN) {
  quizSource = lessonN;
  const pool = lessonN ? lessonById(lessonN).vocab.slice() : allVocab();
  const sents = sentencesFor(lessonN);

  // Phần từ vựng: 4 dạng. Lấy tối đa 8 câu hỏi từ.
  const wordPick = shuffle(pool).slice(0, Math.min(8, pool.length));
  const wordQs = wordPick.map((v, i) => ({ kind: 'word', v, type: QUIZ_TYPES[i % QUIZ_TYPES.length] }));

  // Phần câu: vừa sắp xếp vừa dịch. Mỗi câu hiện 1 dạng (trộn đều).
  const sentPick = shuffle(sents.slice());
  const sentQs = [];
  sentPick.forEach((s, i) => sentQs.push({ kind: 'sentence', s, type: i % 2 === 0 ? 'arrange' : 'sentence' }));
  // giới hạn để bài không quá dài: tất cả-bài lấy 6 câu, một-bài lấy hết (tối đa 10)
  const sentLimited = lessonN ? sentQs.slice(0, 10) : sentQs.slice(0, 6);

  quizList = shuffle([...wordQs, ...sentLimited]);
  if (quizList.length === 0) { document.getElementById('quiz-body').innerHTML = '<p class="sub">Bài này chưa đủ dữ liệu để kiểm tra.</p>'; return; }
  quizIdx = 0; quizScore = 0;
  renderQuiz();
}
const TYPE_LABEL = { choose:'Chọn nghĩa đúng', fill:'Điền chữ Hán', match:'Nối từ với nghĩa', translate:'Dịch từ Việt → Trung', arrange:'Sắp xếp thành câu', sentence:'Dịch câu Việt → Trung' };
function renderQuiz() {
  const body = document.getElementById('quiz-body');
  if (quizIdx >= quizList.length) return finishQuiz();
  const item = quizList[quizIdx];
  const head = '<div class="q-progress"><i style="width:' + (quizIdx/quizList.length*100) + '%"></i></div>' +
    '<div class="q-typebadge">' + TYPE_LABEL[item.type] + ' · Câu ' + (quizIdx+1) + '/' + quizList.length + '</div>';
  if (item.kind === 'sentence') {
    if (item.type === 'arrange') { body.innerHTML = head + qArrange(item.s); buildArrange(item.s); }
    else body.innerHTML = head + qSentence(item.s);
    return;
  }
  const q = item.v, type = item.type;
  if (type === 'choose') body.innerHTML = head + qChoose(q);
  else if (type === 'fill') body.innerHTML = head + qFill(q);
  else if (type === 'match') { body.innerHTML = head + qMatch(q); drawMatch(); }
  else body.innerHTML = head + qTranslate(q);
}
function qChoose(q) {
  const wrong = shuffle(allVocab().filter(v => v.m !== q.m)).slice(0, 3).map(v => v.m);
  const opts = shuffle([q.m, ...wrong]);
  return '<div class="q-card"><div class="q-prompt"><div class="qh hanzi">' + esc(q.h) + '</div>' +
    '<div class="qp">' + esc(q.p) + ' <button class="spk sm" onclick="speak(\'' + esc(q.h) + '\')">🔊</button></div>' +
    '<div class="qq">Chữ này nghĩa là gì?</div></div><div class="opts" id="opts">' +
    opts.map(o => '<button class="opt" onclick="answerChoose(this,' + (o===q.m?1:0) + ')">' + esc(o) + '</button>').join('') +
    '</div><button class="q-next" id="qnext" onclick="nextQuiz()">Câu tiếp →</button></div>';
}
function answerChoose(btn, correct) {
  const q = quizList[quizIdx].v;
  [...document.getElementById('opts').children].forEach(b => { b.disabled = true; if (b.textContent === q.m) b.classList.add('correct'); });
  if (correct) quizScore++; else btn.classList.add('wrong');
  feedbackSound(!!correct);
  document.getElementById('qnext').classList.add('show');
}
function qFill(q) {
  return '<div class="q-card"><div class="q-prompt">' +
    '<div class="qq" style="margin-top:0">Điền chữ Hán đúng:</div>' +
    '<div class="fill-clue"><span class="fill-py">' + esc(q.p) + '</span><span class="fill-m">' + esc(q.m) + '</span></div>' +
    '<button class="spk sm" onclick="speak(\'' + esc(q.h) + '\')">🔊 Nghe</button></div>' +
    '<input class="fill-input hanzi" id="fillin" placeholder="Gõ chữ Hán..." autocomplete="off"/>' +
    '<button class="q-check" id="fillcheck" onclick="answerFill()">Kiểm tra</button>' +
    '<div class="q-result" id="fillres"></div>' +
    '<button class="q-next" id="qnext" onclick="nextQuiz()">Câu tiếp →</button></div>';
}
function answerFill() {
  const q = quizList[quizIdx].v;
  const val = (document.getElementById('fillin').value || '').trim();
  const ok = val === q.h;
  if (ok) quizScore++;
  document.getElementById('fillin').disabled = true;
  document.getElementById('fillcheck').style.display = 'none';
  document.getElementById('fillres').innerHTML = ok
    ? '<div class="res-ok">✓ ' + praiseMsg() + '</div>'
    : '<div class="res-no">✗ ' + encourageMsg() + ' Đáp án: <b class="hanzi">' + esc(q.h) + '</b></div>';
  feedbackSound(ok);
  document.getElementById('qnext').classList.add('show');
}
let matchState = null;
function qMatch(q) {
  const pool = quizSource ? lessonById(quizSource).vocab : allVocab();
  const picks = shuffle([q, ...shuffle(pool.filter(v => v.h !== q.h)).slice(0, 3)]).slice(0, 4);
  matchState = { picks, left: shuffle(picks.slice()), right: shuffle(picks.slice()), sel: null, paired: {}, correctCount: 0 };
  return '<div class="q-card"><div class="qq" style="text-align:center;margin-bottom:14px">Chạm 1 chữ Hán rồi chạm nghĩa tương ứng</div>' +
    '<div class="match-grid"><div class="match-col" id="mleft"></div><div class="match-col" id="mright"></div></div>' +
    '<button class="q-next" id="qnext" onclick="nextQuiz()">Câu tiếp →</button></div>';
}
function drawMatch() {
  const L = document.getElementById('mleft'), R = document.getElementById('mright');
  if (!L || !R) return;
  L.innerHTML = matchState.left.map(v =>
    '<button class="match-item hanzi' + (matchState.paired[v.h]?' done':'') + (matchState.sel===v.h?' sel':'') + '" ' +
    (matchState.paired[v.h]?'disabled':'') + ' onclick="matchPickLeft(\'' + esc(v.h) + '\')">' + esc(v.h) + '</button>').join('');
  R.innerHTML = matchState.right.map(v =>
    '<button class="match-item' + (matchState.paired[v.h]?' done':'') + '" ' +
    (matchState.paired[v.h]?'disabled':'') + ' onclick="matchPickRight(\'' + esc(v.h) + '\')">' + esc(v.m) + '</button>').join('');
}
function matchPickLeft(h) { matchState.sel = h; drawMatch(); }
function matchPickRight(h) {
  if (!matchState.sel) return;
  if (matchState.sel === h) {
    matchState.paired[h] = true; matchState.correctCount++;
    feedbackSound(true);
    if (matchState.correctCount === matchState.picks.length) {
      quizScore++;
      document.getElementById('qnext').classList.add('show');
    }
  } else {
    feedbackSound(false);
  }
  matchState.sel = null; drawMatch();
}
function qTranslate(q) {
  return '<div class="q-card"><div class="q-prompt">' +
    '<div class="qq" style="margin-top:0">Dịch sang tiếng Trung (viết chữ Hán):</div>' +
    '<div class="trans-vi">"' + esc(q.m) + '"</div>' +
    '<div class="qp">Gợi ý pinyin: ' + esc(q.p) + '</div></div>' +
    '<input class="fill-input hanzi" id="transin" placeholder="Gõ chữ Hán..." autocomplete="off"/>' +
    '<button class="q-check" id="transcheck" onclick="answerTranslate()">Kiểm tra</button>' +

  // mục 22: từ đồng nghĩa chấp nhận thay thế nhau

// Dạng 5: sắp xếp câu — xáo trộn các chữ/từ, học sinh chạm theo thứ tự đúng
let arrangeState = null;
function qArrange(s) {
  return '<div class="q-card"><div class="q-prompt">' +
    '<div class="qq" style="margin-top:0">Sắp xếp thành câu đúng:</div>' +
    '<div class="trans-vi" style="font-size:17px">"' + esc(s.vi) + '"</div></div>' +
    '<div class="arrange-answer" id="arr-ans"></div>' +
    '<div class="arrange-pool" id="arr-pool"></div>' +
    '<div class="q-result" id="arr-res"></div>' +
    '<button class="q-check" id="arr-check" onclick="checkArrange()">Kiểm tra</button>' +
    '<button class="q-next" id="qnext" onclick="nextQuiz()">Câu tiếp →</button></div>';
}
function buildArrange(s) {
  // tách câu thành các "token": ưu tiên gom từ vựng, còn lại theo ký tự
  let tokens = tokenizeSentence(s.zh);
  // mục 9: nếu câu ra quá ít ô (1 từ như 对不起), tách hẳn thành từng chữ để học sinh sắp xếp
  if (tokens.length < 2) {
    tokens = [...s.zh.replace(/[。？！，]/g, '')];
  }
  arrangeState = { correct: tokens, chosen: [], pool: shuffle(tokens.map((t, i) => ({ t, i }))) };
  drawArrange();
}
function tokenizeSentence(zh) {
  // bỏ dấu câu cuối, tách: cố gắng gom từ 2-3 ký tự có trong từ vựng
  const clean = zh.replace(/[。？！，]/g, '');
  const vocabSet = new Set(allVocab().map(v => v.h).filter(h => [...h].length >= 2));
  const chars = [...clean];
  const out = [];
  let i = 0;
  while (i < chars.length) {
    let matched = null;
    for (let len = 3; len >= 2; len--) {
      const cand = chars.slice(i, i + len).join('');
      if (vocabSet.has(cand)) { matched = cand; break; }
    }
    if (matched) { out.push(matched); i += [...matched].length; }
    else { out.push(chars[i]); i++; }
  }
  return out;
}
function drawArrange() {
  const ans = document.getElementById('arr-ans'), pool = document.getElementById('arr-pool');
  if (!ans || !pool) return;
  ans.innerHTML = arrangeState.chosen.length
    ? arrangeState.chosen.map((c, k) => '<button class="tok tok-ans hanzi" onclick="unpickArrange(' + k + ')">' + esc(c.t) + '</button>').join('')
    : '<span class="arr-placeholder">Chạm các ô bên dưới theo thứ tự…</span>';
  pool.innerHTML = arrangeState.pool.map((c) =>
    '<button class="tok hanzi' + (c.used ? ' used' : '') + '" ' + (c.used ? 'disabled' : '') + ' onclick="pickArrange(' + c.i + ')">' + esc(c.t) + '</button>').join('');
}
function pickArrange(idx) {
  const item = arrangeState.pool.find(c => c.i === idx && !c.used);
  if (!item) return;
  item.used = true; arrangeState.chosen.push(item); drawArrange();
}
function unpickArrange(k) {
  const item = arrangeState.chosen.splice(k, 1)[0];
  if (item) item.used = false;
  drawArrange();
}
function checkArrange() {
  const result = arrangeState.chosen.map(c => c.t).join('');
  const target = arrangeState.correct.join('');
  const ok = result === target;
  if (ok) quizScore++;
  document.getElementById('arr-check').style.display = 'none';
  document.getElementById('arr-res').innerHTML = ok
    ? '<div class="res-ok">✓ ' + praiseMsg() + ' <span class="hanzi">' + esc(target) + '</span></div>'
    : '<div class="res-no">✗ ' + encourageMsg() + ' Câu đúng: <b class="hanzi">' + esc(target) + '</b></div>';
  feedbackSound(ok);
  document.getElementById('qnext').classList.add('show');
}

// Dạng 6: dịch câu (Việt → Trung) theo bài khóa
function qSentence(s) {

    '<div class="qq" style="margin-top:0">Dịch câu này sang tiếng Trung:</div>' +

// Chuẩn hóa câu để so khớp: bỏ dấu câu/khoảng trắng, đồng nhất các biến thể tương đương.
function normSentence(x) {
  let s = (x || '').replace(/[\s。，、！？,.!?]/g, '');
  // mục 6+8: đồng nhất 有一点儿 = 有点儿 = 有一点 = 有点 ; 一点儿 = 一点 ; 点儿 = 点
  s = s.replace(/有一点儿/g, '有点').replace(/有点儿/g, '有点').replace(/有一点/g, '有点');
  s = s.replace(/一点儿/g, '一点').replace(/点儿/g, '点');
  // mục 17: 你 = 您
  s = s.replace(/您/g, '你');
  // Từ lặp âm tiết: 常常=常, 看看=看, 想想=想... (AA -> A)
  s = s.replace(/([\u4e00-\u9fff])\1/g, '$1');
  return s;
}
// Sinh các hoán vị hợp lệ khi trạng từ thời gian đứng trước/sau chủ ngữ (mục 11).
function timeWordVariants(zh) {
  const times = ['今天', '昨天', '明天', '每天', '上午', '下午', '早上', '晚上', '最近'];
  const pronouns = ['我们', '你们', '他们', '我', '你', '您', '他', '她'];
  const out = new Set([zh]);
  for (const t of times) {
    for (const p of pronouns) {
      // dạng "时间+CN..." <-> "CN+时间..."
      if (zh.startsWith(t + p)) out.add(p + t + zh.slice((t + p).length));
      if (zh.startsWith(p + t)) out.add(t + p + zh.slice((p + t).length));
    }
  }
  return [...out];
}
function sentenceMatches(input, target, alts) {
  const candidates = [target, ...(alts || [])];
  // mở rộng bằng hoán vị trạng từ thời gian
  const expanded = new Set();
  candidates.forEach(c => timeWordVariants(c).forEach(v => expanded.add(normSentence(v))));
  return expanded.has(normSentence(input));
}

function answerSentence() {
  const s = quizList[quizIdx].s;
  const val = (document.getElementById('sentin').value || '').trim();
  const ok = sentenceMatches(val, s.zh, s.alt);
  if (ok) quizScore++;
  document.getElementById('sentin').disabled = true;
  document.getElementById('sentcheck').style.display = 'none';

  document.getElementById('sentres').innerHTML = ok
    ? '<div class="res-ok">✓ Giỏi quá! <span class="hanzi">' + esc(val.trim()) + '</span></div>' + moreWays
    : '<div class="res-no">✗ Đáp án: <b class="hanzi">' + esc(s.zh) + '</b></div>' + moreWays;
  feedbackSound(ok);
  document.getElementById('qnext').classList.add('show');
}

const STROKE_RULES = [

  ['④', 'Trái trước, phải sau', '从左到右 — viết từ trái sang phải, như chữ 你'],

  ['⑥', 'Vào nhà trước, đóng cửa sau', '先里头后封口 — như chữ 回/国: viết trong xong mới đóng nét cuối khung'],

function strokeRulesHtml() {

function setupPad() {
  const cv = document.getElementById('pad'); wctx = cv.getContext('2d');
  wctx.lineWidth = 12; wctx.lineCap = 'round'; wctx.lineJoin = 'round'; wctx.strokeStyle = '#1A1413';
  wStrokes = []; wCur = []; wDrawing = false;
  const pos = e => { const r = cv.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return { x: t.clientX - r.left, y: t.clientY - r.top }; };
  const start = e => { e.preventDefault(); wDrawing = true; wCur = []; const p = pos(e); wCur.push(p); wctx.beginPath(); wctx.moveTo(p.x, p.y); };
  const move = e => { if (!wDrawing) return; e.preventDefault(); const p = pos(e); wCur.push(p); wctx.lineTo(p.x, p.y); wctx.stroke(); };
  const end = () => { if (!wDrawing) return; wDrawing = false; if (wCur.length > 1) wStrokes.push(wCur); };
  cv.addEventListener('mousedown', start); cv.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
  cv.addEventListener('touchstart', start, {passive:false}); cv.addEventListener('touchmove', move, {passive:false}); cv.addEventListener('touchend', end);

  let pts = Math.max(40, 100 - Math.abs(drawn - expected) * 12);

  writeRated = true;
  const stars = pts >= 85 ? '⭐⭐⭐' : pts >= 60 ? '⭐⭐' : '⭐';
  document.getElementById('wres').innerHTML =
    '<div class="' + (pts>=60?'res-ok':'res-no') + '">' + stars + ' ' + pts + '/100 · viết ' + drawn + ' nét (chuẩn ~' + expected + ')</div>';
  document.querySelector('.w-rate').style.display = 'none';

function estimateStrokes(hanzi) {

let gameRound = null, gameScore = 0, gameCombo = 0, gameQueue = [], gameSource = null;
function renderGameStart() {
  const lessonsWithGame = Object.keys(GAME_DATA.byLesson).length;
  document.getElementById('game').innerHTML =
    '<h1 class="title">🎮 Ghép bộ thủ</h1>' +

    '<div class="hero-text"><h1 class="display" style="font-size:18px">Cách chơi</h1>' +
    '<p>Nhìn nghĩa tiếng Việt, chọn đúng các bộ thủ để tạo thành chữ Hán. ' + lessonsWithGame + ' bài có trò chơi này.</p></div></div>' +
    sourcePicker('startGame', countGameChars(null)) +
    '<div id="game-body"></div>';
}
function countGameChars(lessonN) {
  if (lessonN) return (GAME_DATA.byLesson[lessonN] || []).length;
  return Object.values(GAME_DATA.byLesson).reduce((s, a) => s + a.length, 0);
}
function gameCharsFor(lessonN) {
  if (lessonN) return (GAME_DATA.byLesson[lessonN] || []).map(x => ({...x, lesson:lessonN}));
  return Object.entries(GAME_DATA.byLesson).flatMap(([n, arr]) => arr.map(x => ({...x, lesson:+n})));
}
function startGame(lessonN) {
  gameSource = lessonN;
  const chars = gameCharsFor(lessonN);
  if (chars.length === 0) { document.getElementById('game-body').innerHTML = '<p class="sub">Bài này chưa có dữ liệu bộ thủ để chơi.</p>'; return; }
  gameQueue = shuffle(chars).slice(0, 10);
  gameScore = 0; gameCombo = 0;
  nextGameRound();
}
function nextGameRound() {
  if (gameQueue.length === 0) return finishGame();
  const c = gameQueue[0];
  // các bộ thủ đúng + 2-3 bộ thủ nhiễu lấy từ chữ khác
  const others = shuffle(gameCharsFor(gameSource).flatMap(x => x.r).filter(r => !c.r.includes(r)));
  const distract = [...new Set(others)].slice(0, Math.min(3, Math.max(2, c.r.length)));
  const tiles = shuffle([...c.r.map(r => ({ r, correct: true })), ...distract.map(r => ({ r, correct: false }))]);
  gameRound = { c, tiles, slots: [], solved: false };
  drawGame();
}
function drawGame() {
  const c = gameRound.c;
  const slotsHtml = c.r.map((_, i) =>
    '<div class="gslot' + (gameRound.slots[i] ? ' filled' : '') + '">' + (gameRound.slots[i] ? esc(gameRound.slots[i]) : '?') + '</div>'
  ).join('');
  const preview = gameRound.slots.length === c.r.length ? esc(c.h) : '';
  const poolHtml = gameRound.tiles.map((t, i) =>
    '<button class="gtile' + (t.used ? ' used' : '') + '" id="gt' + i + '" onclick="pickTile(' + i + ')">' +
      '<span>' + esc(t.r) + '</span>' +
      '<span class="gtile-name">' + esc(GAME_DATA.radName[t.r] || '') + '</span></button>'
  ).join('');
  document.getElementById('game-body').innerHTML =
    '<div class="game-hud"><span class="gscore">⭐ ' + gameScore + ' điểm</span>' +
      '<span class="gcombo">🔥 Combo ' + gameCombo + '</span>' +
      '<span>Còn ' + gameQueue.length + '</span></div>' +
    '<div class="game-target"><div class="gt-label">Ghép chữ có nghĩa:</div>' +
      '<div class="gt-meaning">' + esc(c.m) + '</div>' +
      '<div class="gt-slots">' + slotsHtml + '</div>' +
      '<div class="gt-preview">' + preview + '</div></div>' +
    '<div class="game-feedback" id="gfb"></div>' +
    '<div class="game-pool">' + poolHtml + '</div>' +
    '<div class="game-actions">' +
      '<button class="g-hint" onclick="gameHint()">💡 Gợi ý phát âm</button>' +
      '<button class="g-skip" onclick="gameSkip()">Bỏ qua →</button></div>';
}
function pickTile(i) {
  if (gameRound.solved) return;
  const t = gameRound.tiles[i];
  if (t.used) return;
  const c = gameRound.c;
  // CHẤP NHẬN MỌI THỨ TỰ: chỉ cần là bộ thủ đúng và chưa chọn đủ số lượng cần thiết
  // (nếu chữ có 2 bộ thủ giống nhau, vẫn cho phép chọn đủ số lần)
  const needCount = c.r.filter(r => r === t.r).length;
  const haveCount = gameRound.slots.filter(r => r === t.r).length;
  if (t.correct && haveCount < needCount) {
    t.used = true;
    gameRound.slots.push(t.r);
    drawGame();
    if (gameRound.slots.length === c.r.length) gameWin();
  } else {
    // sai: rung + reset combo
    gameCombo = 0;
    const el = document.getElementById('gt' + i);
    if (el) { el.classList.add('shake'); setTimeout(() => el && el.classList.remove('shake'), 400); }
    const fb = document.getElementById('gfb'); if (fb) { fb.className = 'game-feedback no'; fb.textContent = 'Bộ thủ này không thuộc chữ đó!'; }
  }
}
function gameWin() {
  gameRound.solved = true;
  gameCombo++;
  const pts = 10 + (gameCombo - 1) * 5; // combo thưởng thêm
  gameScore += pts;
  const fb = document.getElementById('gfb');
  if (fb) { fb.className = 'game-feedback ok'; fb.innerHTML = '✓ Đúng rồi! <b class="hanzi">' + esc(gameRound.c.h) + '</b> (' + esc(gameRound.c.m) + ') +' + pts + ' điểm'; }
  speak(gameRound.c.h);
  setTimeout(() => { gameQueue.shift(); nextGameRound(); }, 1300);
}
function gameHint() { speak(gameRound.c.h); }
function gameSkip() { gameCombo = 0; gameQueue.shift(); nextGameRound(); }
function finishGame() {
  // lưu điểm cao nhất game
  if (!progress.gameBest || gameScore > progress.gameBest) progress.gameBest = gameScore;
  progress.scores.push({ type: 'game', score: gameScore, total: 10, pct: Math.min(100, gameScore), when: Date.now(), cls: user.cls, name: user.name });

const AIKEY_STORE = 'tt24g_aikey';
const AIMODEL_STORE = 'tt24g_aimodel';
function getAiKey(){ try{ return localStorage.getItem(AIKEY_STORE) || ''; }catch{ return ''; } }
function setAiKey(k){ try{ localStorage.setItem(AIKEY_STORE, k || ''); }catch{} }
function getAiModel(){ try{ return localStorage.getItem(AIMODEL_STORE) || 'gemini-2.5-flash'; }catch{ return 'gemini-2.5-flash'; } }
function setAiModel(m){ try{ localStorage.setItem(AIMODEL_STORE, m || 'gemini-2.5-flash'); }catch{} }
const PROXY_URL = '/.netlify/functions/gemini';
let proxyOn = false;
function aiReady(){ return !!getAiKey() || proxyOn; }
async function geminiRaw(model, body){
  const key = getAiKey();
  let res;
  if (key){
    res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/' + encodeURIComponent(model) + ':generateContent?key=' + encodeURIComponent(key), { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  } else {
    res = await fetch(PROXY_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ model: model, body: body }) });
  }
  if (!res.ok){ let t=''; try{ t=await res.text(); }catch{} if (/API key not valid|API_KEY_INVALID/i.test(t)) throw new Error('BAD_KEY'); throw new Error('HTTP '+res.status); }
  const data = await res.json();
  if (data && data.error === 'NO_SERVER_KEY') throw new Error('NO_SERVER_KEY');
  return data;
}
async function probeProxy(){
  try { const r = await fetch(PROXY_URL, { method:'GET' }); if (r.ok){ const j = await r.json(); proxyOn = !!j.ok; } } catch(e){ proxyOn = false; }
  try { const sc = document.querySelector('.screen.active'); if (sc && sc.id==='speak') renderSpeak(); if (sc && sc.id==='settings') renderSettings(); } catch(e){}
}

async function geminiCall(parts, opts){
  opts = opts || {};
  const body = { contents: [{ role: 'user', parts: parts }], generationConfig: opts.json ? { responseMimeType: 'application/json', temperature: 0.2 } : { temperature: 0.3 } };
  const data = await geminiRaw(getAiModel(), body);
  const parts2 = ((((data.candidates || [])[0] || {}).content) || {}).parts || [];
  return parts2.map(function(p){ return p.text || ''; }).join('');
}
function parseAiJson(s){
  if (!s) return null;
  s = s.replace(/^```(?:json)?/i, '').replace(/```\s*$/, '').trim();
  const a = s.indexOf('{'), b = s.lastIndexOf('}');
  if (a >= 0 && b > a) s = s.slice(a, b + 1);
  try { return JSON.parse(s); } catch { return null; }
}
function blobToB64(blob){
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => { const s = r.result; resolve(s.slice(s.indexOf(',') + 1)); };
    r.onerror = reject;
    r.readAsDataURL(blob);
  });
}
function aiErrMsg(e){
  const m = (e && e.message) || '';
  if (m === 'NO_KEY') return 'Chưa nhập API key (vào Cài đặt).';
  if (m === 'BAD_KEY') return 'API key không hợp lệ. Kiểm tra lại.';
  if (/HTTP 429/.test(m)) return 'Vượt giới hạn dùng, thử lại sau ít phút.';
  if (/HTTP 403/.test(m)) return 'Key chưa được cấp quyền. Tạo lại key ở Google AI Studio.';
  if (/Failed to fetch|NetworkError|TypeError/i.test(m)) return 'Lỗi mạng/CORS. Cần Internet (nên mở app qua web, không phải file offline).';
  return 'Lỗi: ' + m;
}
function clampN(x, a, b){ x = +x; if (isNaN(x)) x = 0; return Math.max(a, Math.min(b, x)); }
function sq(s){ return "'" + (s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'") + "'"; }
function normHan(s){ return (s || '').replace(/[^一-鿿]/g, ''); }

function stripKewenLines(text){

function scoreFull(kewen, transcript){
  const lines = stripKewenLines(kewen);
  const lineChars = lines.map(function(ln){ return normHan(ln).split(''); });
  const allChars = [].concat.apply([], lineChars);
  const matched = lcsMatch(allChars, normHan(transcript).split(''));
  let idx = 0, totalOk = 0; const lineRes = [];
  for (let li = 0; li < lineChars.length; li++){
    const len = lineChars[li].length; let ok = 0; const wrong = [];
    for (let c = 0; c < len; c++){ if (matched[idx + c]) ok++; else wrong.push(lineChars[li][c]); }
    idx += len; totalOk += ok;
    lineRes.push({ text: lines[li], len: len, score: len ? Math.round(ok / len * 100) : 100, wrong: wrong });
  }
  const total = allChars.length || 1;
  const overall = Math.round(totalOk / total * 100);
  const errChars = lineRes.reduce(function(a, x){ return a.concat(x.wrong); }, []);
  const weak = lineRes.filter(function(x){ return x.score < 80 && x.len >= 2; }).sort(function(a, b){ return a.score - b.score; });
  let advice;
  if (overall >= 85) advice = 'Tuyệt vời! Bạn đọc cả bài rất tốt. Hãy giữ phong độ này nhé!';
  else if (overall >= 70) advice = 'Đạt yêu cầu rồi! Chú ý thêm vài chỗ tô đỏ để đọc hay hơn.';
  else if (overall >= 55) advice = 'Gần đạt rồi. Nghe mẫu và luyện lại các câu tô đỏ, rồi đọc lại cả bài.';
  else advice = 'Cố lên nhé! Nghe mẫu từng câu, đọc chậm rồi đọc lại cả bài.';
  return { overall: overall, lines: lineRes, errChars: errChars, weak: weak, advice: advice };
}

function lcsMatch(a, b){
  const n = a.length, m = b.length;
  const dp = Array.from({ length: n + 1 }, () => new Array(m + 1).fill(0));
  for (let i = 1; i <= n; i++) for (let j = 1; j <= m; j++)
    dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  const matched = new Array(n).fill(false);
  let i = n, j = m;
  while (i > 0 && j > 0) {
    if (a[i-1] === b[j-1]) { matched[i-1] = true; i--; j--; }
    else if (dp[i-1][j] >= dp[i][j-1]) i--; else j--;
  }
  return matched;
}
function scorePronLocal(transcript, it){
  const tgt = normHan(it.zh).split('');
  const got = normHan(transcript).split('');
  if (!transcript) {
    return { score: 0, mode: 'browser', transcript: '', errChars: tgt,
      charMarks: tgt.map(c => ({ c, st: 'miss' })),
      advice: 'Chưa nhận được giọng nói. Hãy nói to & rõ, dùng Chrome. Hoặc bật AI để chấm bằng ghi âm.' };
  }
  const matched = lcsMatch(tgt, got);
  const marks = tgt.map((c, k) => ({ c, st: matched[k] ? 'ok' : 'bad' }));
  const okN = matched.filter(Boolean).length;
  const score = Math.round(okN / Math.max(1, tgt.length) * 100);
  const errChars = marks.filter(m => m.st !== 'ok').map(m => m.c);
  let advice = score >= 90 ? 'Rất tốt! Phát âm gần như chuẩn.'
    : score >= 70 ? 'Khá tốt. Chú ý các chữ tô đỏ.'
    : 'Cần luyện thêm. Nghe lại mẫu, đọc chậm từng chữ tô đỏ.';
  return { score, mode: 'browser', transcript, charMarks: marks, errChars, advice,
    note: 'Chế độ miễn phí so khớp chữ nghe được, chưa chấm thanh điệu. Bật AI để chấm thanh điệu chi tiết.' };
}

function tcStudentRows(byStu, mode, totalDays){
  return Object.keys(byStu).map(function(n){
    const arr = byStu[n];
    const a = Math.round(arr.reduce(function(s,r){ return s+(+r.score||0); }, 0) / arr.length);
    const errs = {}; arr.forEach(function(r){ String(r.errChars||'').split('').forEach(function(c){ if (/[一-鿿]/.test(c)) errs[c]=(errs[c]||0)+1; }); });
    const top = Object.entries(errs).sort(function(p,q){ return q[1]-p[1]; }).slice(0,8);
    const scol = a>=80?'#059669':(a>=60?'#f59e0b':'#D9001B');
    let meta;
    if (mode==='course'){
      const sdays = new Set(arr.map(function(r){ return r.day; })).size;
      const att = totalDays?Math.round(sdays/totalDays*100):0;
      const acol = att>=80?'#059669':(att>=50?'#f59e0b':'#D9001B');
      meta = 'Chuyên cần <b style="color:'+acol+'">'+att+'%</b> ('+sdays+'/'+totalDays+' buổi) · điểm TB <b style="color:'+scol+'">'+a+'%</b>';
    } else {
      meta = arr.length+' lượt · điểm TB <b style="color:'+scol+'">'+a+'%</b>';
    }
    return '<div class="tc-row" data-att="'+(mode==='course'?(totalDays?Math.round(new Set(arr.map(function(r){return r.day;})).size/totalDays*100):0):a)+'"><div class="tcr-h"><span class="tcr-name">'+esc(n)+'</span><span class="tcr-meta">'+meta+'</span></div>'+
      (top.length?'<div class="tcr-badges">'+top.map(function(e){ return '<span class="tcr-badge zh">'+esc(e[0])+(e[1]>1?' ×'+e[1]:'')+'</span>'; }).join('')+'</div>':'<div class="note-line" style="margin-top:6px">Không có lỗi nổi bật 👍</div>')+'</div>';
  });
}
function tcDayView(recs, roster, day){
  const byStu = {}; recs.forEach(function(r){ const n=r.name||'?'; (byStu[n]=byStu[n]||[]).push(r); });
  const students = Object.keys(byStu);
  const didSet = {}; students.forEach(function(n){ didSet[n.toLowerCase()]=true; });
  const notDone = roster.filter(function(n){ return !didSet[n.toLowerCase()]; });
  const avg = recs.length?Math.round(recs.reduce(function(s,r){ return s+(+r.score||0); },0)/recs.length):0;
  const rows = tcStudentRows(byStu, 'day', 0).join('');
  return '<h2 class="sec-head">Ngày ' + esc(tcDayLabel(day)) + '</h2>' +
    '<div class="tc-stat">' +
      '<div class="tcs"><div class="tcs-n">'+students.length+'</div><div class="tcs-l">em đã làm</div></div>' +
      (roster.length?'<div class="tcs"><div class="tcs-n" style="color:#D9001B">'+notDone.length+'</div><div class="tcs-l">em chưa làm</div></div>':'') +
      '<div class="tcs"><div class="tcs-n">'+recs.length+'</div><div class="tcs-l">lượt</div></div>' +
      '<div class="tcs"><div class="tcs-n">'+avg+'%</div><div class="tcs-l">điểm TB</div></div>' +
    '</div>' +
    (notDone.length?'<div class="panel" style="border:1px solid rgba(217,0,27,.3)"><b style="font-size:15px;color:#D9001B">⚠️ '+notDone.length+' em CHƯA làm ngày này</b><div class="note-line" style="margin-top:4px">'+esc(notDone.join('、'))+'</div></div>':'') +
    '<h2 class="sec-head">Chi tiết từng em</h2>' + rows;
}
function tcCourseView(recs, roster, days){
  const totalDays = days.length;
  const byStu = {}; recs.forEach(function(r){ const n=r.name||'?'; (byStu[n]=byStu[n]||[]).push(r); });
  const students = Object.keys(byStu);
  const avgAll = Math.round(recs.reduce(function(s,r){ return s+(+r.score||0); },0)/recs.length);
  const didSet = {}; students.forEach(function(n){ didSet[n.toLowerCase()]=true; });
  const notEver = roster.filter(function(n){ return !didSet[n.toLowerCase()]; });
  const rowsArr = tcStudentRows(byStu, 'course', totalDays);
  rowsArr.sort(function(a,b){ return (+b.match(/data-att="(\d+)"/)[1]) - (+a.match(/data-att="(\d+)"/)[1]); });
  return '<h2 class="sec-head">Tổng cả khóa (' + totalDays + ' buổi có học)</h2>' +
    '<div class="tc-stat">' +
      '<div class="tcs"><div class="tcs-n">'+students.length+'</div><div class="tcs-l">em có làm</div></div>' +
      (roster.length?'<div class="tcs"><div class="tcs-n" style="color:#D9001B">'+notEver.length+'</div><div class="tcs-l">em chưa làm lần nào</div></div>':'') +
      '<div class="tcs"><div class="tcs-n">'+totalDays+'</div><div class="tcs-l">buổi</div></div>' +
      '<div class="tcs"><div class="tcs-n">'+avgAll+'%</div><div class="tcs-l">điểm TB lớp</div></div>' +
    '</div>' +
    (notEver.length?'<div class="panel" style="border:1px solid rgba(217,0,27,.3)"><b style="font-size:15px;color:#D9001B">⚠️ '+notEver.length+' em chưa làm bài lần nào cả khóa</b><div class="note-line" style="margin-top:4px">'+esc(notEver.join('、'))+'</div></div>':'') +
    '<div class="note-line" style="margin:0 2px 10px">"Chuyên cần %" = số buổi em có làm bài chia tổng số buổi lớp đã học.</div>' +
    '<h2 class="sec-head">Theo từng học viên (xếp theo chuyên cần)</h2>' + rowsArr.join('');
}
function tcSet(t){ tcTab = t; renderTeacher(); }
function tcBody(){
  const b = document.getElementById('tc-body');
  if (tcTab === 'export') { b.innerHTML = tcExportHTML(); return; }
  const list = (progress.aiLog || []).filter(x => x.kind === tcTab);
  if (!list.length) { b.innerHTML = '<p class="tc-empty">Chưa có dữ liệu. Học sinh luyện ở tab ' + (tcTab === 'pron' ? 'Luyện nói' : 'Chấm chữ viết') + ' sẽ hiện ở đây.</p>'; return; }
  const n = list.length;
  const avg = Math.round(list.reduce((s, x) => s + (x.score || 0), 0) / n);
  const errFreq = {};
  list.forEach(x => (x.errChars || []).forEach(c => (c || '').split('').forEach(ch => { if (/[一-鿿]/.test(ch)) errFreq[ch] = (errFreq[ch] || 0) + 1; })));
  const topErr = Object.entries(errFreq).sort((a, b2) => b2[1] - a[1]).slice(0, 18);
  const byStu = {};
  list.forEach(x => { const k = (x.name || '?') + '|' + (x.cls || '?'); (byStu[k] = byStu[k] || []).push(x); });
  let rows = '';
  Object.entries(byStu).forEach(([k, arr]) => {
    const p = k.split('|'), nm = p[0], cl = p[1];
    const a = Math.round(arr.reduce((s, x) => s + (x.score || 0), 0) / arr.length);
    const errs = {};
    arr.forEach(x => (x.errChars || []).forEach(c => (c || '').split('').forEach(ch => { if (/[一-鿿]/.test(ch)) errs[ch] = (errs[ch] || 0) + 1; })));
    const topS = Object.entries(errs).sort((q, w) => w[1] - q[1]).slice(0, 10);
    rows += '<div class="tc-row"><div class="tcr-h"><span class="tcr-name">' + esc(nm) + '</span>' +
      '<span class="tcr-meta">Lớp ' + esc(cl) + ' · ' + arr.length + ' lượt · TB ' + a + 'đ</span></div>' +
      (topS.length ? '<div class="tcr-badges">' + topS.map(e => '<span class="tcr-badge zh">' + esc(e[0]) + (e[1] > 1 ? ' ×' + e[1] : '') + '</span>').join('') + '</div>'
        : '<div class="note-line" style="margin-top:6px">Không có lỗi nổi bật 👍</div>') + '</div>';
  });
  b.innerHTML =
    '<div class="tc-stat"><div class="tcs"><div class="tcs-n">' + n + '</div><div class="tcs-l">lượt luyện</div></div>' +
      '<div class="tcs"><div class="tcs-n">' + Object.keys(byStu).length + '</div><div class="tcs-l">học sinh</div></div>' +
      '<div class="tcs"><div class="tcs-n">' + avg + '</div><div class="tcs-l">điểm TB</div></div></div>' +
    (topErr.length ? '<div class="panel"><b style="font-size:15px">Chữ sai nhiều nhất (cả lớp)</b><div class="tcr-badges" style="margin-top:8px">' +
      topErr.map(e => '<span class="tcr-badge zh">' + esc(e[0]) + ' ×' + e[1] + '</span>').join('') + '</div></div>' : '') +
    '<h2 class="sec-title">Theo học sinh</h2>' + rows;
}
function tcExportHTML(){
  return '<div class="panel"><b style="font-size:15px">Học sinh: gửi báo cáo cho giáo viên</b>' +
    '<p class="note-line">Xuất file rồi gửi cho thầy/cô (Zalo, email...).</p>' +
    '<div class="pill-row" style="margin-top:10px"><button class="btn-primary" onclick="tcDownloadJson()">⬇️ Xuất báo cáo (.json)</button>' +
    '<button class="btn-ghost" onclick="tcDownloadReport()">⬇️ Bản xem (.html)</button></div></div>' +
    '<div class="panel"><b style="font-size:15px">Giáo viên: nạp báo cáo học sinh gửi</b>' +
    '<p class="note-line">Chọn nhiều file .json của các em để gộp & xem tổng hợp.</p>' +
    '<label class="up-zone" for="tc-import" style="padding:18px;margin-top:8px"><input id="tc-import" type="file" accept=".json,application/json" multiple style="display:none" onchange="tcImport(this)"/><div class="up-ic">📥</div><b>Chọn file báo cáo</b></label>' +
    '<div id="tc-import-msg" class="note-line"></div></div>' +
    '<div class="panel"><button class="btn-ghost" onclick="tcClear()">🗑️ Xóa toàn bộ dữ liệu lỗi trên máy này</button></div>';
}
function reportObj(){ return { app: 'TiengTrung24G_quyen1', exported: Date.now(), student: user, aiLog: progress.aiLog || [], scores: progress.scores || [] }; }
function safeName(s){ return (s || 'hocsinh').normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-zA-Z0-9]+/g, '_'); }
function dlBlob(blob, name){
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name;
  document.body.appendChild(a); a.click(); setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
}
function tcDownloadJson(){ dlBlob(new Blob([JSON.stringify(reportObj(), null, 2)], { type: 'application/json' }), 'baocao_' + safeName(user.name) + '.json'); }
function tcDownloadReport(){
  const logs = progress.aiLog || [];
  const pron = logs.filter(x => x.kind === 'pron'), hand = logs.filter(x => x.kind === 'hand');
  const rowsP = pron.map(x => '<tr><td>' + esc(x.target || '') + '</td><td>' + (x.score || 0) + '</td><td>' + esc((x.errChars || []).join(' ')) + '</td><td>' + esc(x.advice || '') + '</td></tr>').join('');
  const rowsH = hand.map(x => '<tr><td>' + (x.score || 0) + '</td><td class="zh">' + esc((x.errChars || []).join(' ')) + '</td><td>' + esc(x.summary || '') + '</td></tr>').join('');
  const html = '<!doctype html><meta charset="utf-8"><title>Báo cáo ' + esc(user.name) + '</title>' +
    '<style>body{font-family:system-ui,sans-serif;max-width:760px;margin:24px auto;padding:0 14px;color:#1A1413}h1{color:#D9001B}table{width:100%;border-collapse:collapse;margin:10px 0}td,th{border:1px solid #ddd;padding:7px;font-size:14px;text-align:left}th{background:#FFF1F2}.zh{font-size:18px}</style>' +
    '<h1>Báo cáo học tập — ' + esc(user.name) + '</h1><p>Lớp: ' + esc(user.cls) + ' · Xuất ngày ' + new Date().toLocaleString('vi-VN') + '</p>' +
    '<h2>Phát âm (' + pron.length + ' lượt)</h2><table><tr><th>Câu</th><th>Điểm</th><th>Chữ sai</th><th>Nhận xét</th></tr>' + (rowsP || '<tr><td colspan=4>Chưa có</td></tr>') + '</table>' +
    '<h2>Chữ viết (' + hand.length + ' lượt)</h2><table><tr><th>Điểm</th><th>Chữ chưa đạt</th><th>Nhận xét</th></tr>' + (rowsH || '<tr><td colspan=3>Chưa có</td></tr>') + '</table>';
  dlBlob(new Blob([html], { type: 'text/html' }), 'baocao_' + safeName(user.name) + '.html');
}
async function tcImport(inp){
  const files = [...(inp.files || [])]; if (!files.length) return;
  let added = 0;
  for (const f of files) {
    try { const j = JSON.parse(await f.text()); if (j && j.aiLog) { progress.aiLog = progress.aiLog.concat(j.aiLog); added += j.aiLog.length; } if (j && j.scores) progress.scores = progress.scores.concat(j.scores); } catch (e) {}
  }
  const seen = new Set();
  progress.aiLog = progress.aiLog.filter(x => { const k = x.when + '|' + x.name + '|' + (x.target || x.summary || ''); if (seen.has(k)) return false; seen.add(k); return true; });
  saveProg();
  const m = document.getElementById('tc-import-msg'); if (m) m.textContent = '✅ Đã nạp ' + added + ' bản ghi từ ' + files.length + ' file.';
  setTimeout(() => { tcTab = 'pron'; renderTeacher(); }, 1200);
}
function tcClear(){ if (confirm('Xóa hết dữ liệu lỗi đã lưu trên máy này?')) { progress.aiLog = []; saveProg(); renderTeacher(); } }


// ---------- Khởi động ----------
bindTabs();
if (user) startApp(); else renderLogin();
probeProxy();

</script>
</body>
</html>
